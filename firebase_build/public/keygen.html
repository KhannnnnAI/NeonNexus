<!doctype html><html lang="vi" translate="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="google" content="notranslate"><title>NeonNexus - Order Complete</title><link rel="stylesheet" href="css/index.css?v=4"><script src="https://unpkg.com/lucide@latest"></script><script>// Apply theme immediately
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);</script><style>.keygen-container{max-width:800px;margin:6rem auto 2rem;padding:2rem;background:rgba(23,26,33,.95);border:1px solid rgba(34,211,238,.2);border-radius:12px;box-shadow:0 0 40px rgba(34,211,238,.1);backdrop-filter:blur(10px);min-height:60vh}.success-header{text-align:center;margin-bottom:3rem;animation:fadeInDown .8s ease-out}.success-icon{width:80px;height:80px;color:#22d3ee;margin-bottom:1.5rem;filter:drop-shadow(0 0 15px rgba(34, 211, 238, .5))}.success-title{font-family:Orbitron,sans-serif;font-size:2.5rem;background:linear-gradient(to right,#fff,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}.success-message{color:#9ca3af;font-size:1.1rem;font-family:"ROG Viet",sans-serif}.key-list{display:flex;flex-direction:column;gap:1.5rem}.key-item{background:rgba(13,16,23,.8);border:1px solid rgba(75,85,99,.4);border-radius:8px;padding:1.5rem;display:flex;align-items:center;gap:1.5rem;animation:slideInUp .5s ease-out forwards;opacity:0;transform:translateY(20px);transition:border-color .3s ease}.key-item:hover{border-color:#22d3ee}.game-thumb{width:120px;height:67px;object-fit:cover;border-radius:6px;box-shadow:0 4px 10px rgba(0,0,0,.5)}.key-details{flex:1}.game-name{color:#fff;font-weight:700;font-size:1.1rem;margin-bottom:.5rem;display:block}.key-box{background:#000;padding:.75rem 1rem;border-radius:4px;font-family:"Courier New",monospace;color:#22d3ee;font-size:1.1rem;letter-spacing:2px;border:1px solid #1f2937;position:relative;display:flex;justify-content:space-between;align-items:center}.copy-btn{background:0 0;border:none;color:#6b7280;cursor:pointer;padding:4px;border-radius:4px;transition:all .2s}.copy-btn:hover{color:#fff;background:rgba(255,255,255,.1)}.back-home-btn{display:inline-flex;align-items:center;gap:.5rem;background:#22d3ee;color:#000;padding:1rem 2rem;border-radius:8px;font-weight:700;text-decoration:none;margin-top:3rem;transition:all .3s ease;border:none;cursor:pointer;font-family:"ROG Viet",sans-serif}.back-home-btn:hover{background:#06b6d4;transform:translateY(-2px);box-shadow:0 4px 15px rgba(34,211,238,.4)}@keyframes fadeInDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}@keyframes slideInUp{to{opacity:1;transform:translateY(0)}}html[data-theme=light] .keygen-container{background:rgba(255,255,255,.85);border-color:rgba(8,145,178,.2);box-shadow:0 0 40px rgba(8,145,178,.1)}html[data-theme=light] .success-title{background:linear-gradient(to right,#0284c7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}html[data-theme=light] .success-message{color:#4b5563}html[data-theme=light] .key-item{background:rgba(240,249,255,.8);border-color:rgba(186,230,253,.5)}html[data-theme=light] .key-item:hover{border-color:#06b6d4}html[data-theme=light] .game-name{color:#0f172a}html[data-theme=light] .key-box{background:#f0f9ff;border-color:#bae6fd;color:#0284c7}html[data-theme=light] .copy-btn{color:#64748b}html[data-theme=light] .copy-btn:hover{color:#0284c7;background:rgba(14,165,233,.1)}</style></head><body class="bg-dark text-gray-100"><div class="tech-bg"></div><div class="tech-gradient"></div><div class="keygen-container"><div class="success-header"><i data-lucide="check-circle" class="success-icon"></i><h1 class="success-title">THANH TOÁN THÀNH CÔNG!</h1><p class="success-message">Cảm ơn bạn đã mua hàng. Dưới đây là mã kích hoạt sản phẩm của bạn.</p></div><div id="key-list-container" class="key-list"></div><div style="text-align:center"><a href="index.html" class="back-home-btn"><i data-lucide="home"></i> QUAY VỀ TRANG CHỦ</a></div></div><script>document.addEventListener("DOMContentLoaded", () => {
        lucide.createIcons();

        // Logic to retrieve purchased items
        // We assume index.js saved 'lastOrder' or similar in localStorage before redirecting
        // Or we check 'cart_guest' or 'cart_userid' if we haven't cleared it yet.
        // Best practice: The checkout flow should save to 'purchasedItems' then clear cart.

        const purchasedItemsJson = localStorage.getItem("purchasedItems");
        const keyListContainer = document.getElementById("key-list-container");

        if (!purchasedItemsJson) {
          keyListContainer.innerHTML =
            '<p style="text-align:center; color:#ef4444;">Không tìm thấy thông tin đơn hàng. Vui lòng liên hệ hỗ trợ.</p>';
          return;
        }

        const items = JSON.parse(purchasedItemsJson);
        const EXCHANGE_RATE = 26000;

        // Helper to generate key
        function generateKey(length) {
          const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789";
          let key = "";
          for (let i = 0; i < length; i++) {
            if (i > 0 && i % 5 === 0) {
              key += "-";
            }
            key += chars.charAt(Math.floor(Math.random() * chars.length));
          }
          return key;
        }

        // Render items
        let globalIndex = 0;
        items.forEach((item) => {
          const quantity = item.quantity || 1;

          for (let q = 0; q < quantity; q++) {
            // Determine key length
            let keyLength = 0;
            let numGroups = 0;

            let priceInUSD = (item.originalPrice || item.price) / EXCHANGE_RATE;

            if (
              item.category === "GiftCard" ||
              item.title.toLowerCase().includes("gift card")
            ) {
              numGroups = 3;
            } else if (priceInUSD >= 25) {
              numGroups = 5;
            } else {
              numGroups = 3;
            }

            let code = "";
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789";

            for (let g = 0; g < numGroups; g++) {
              if (g > 0) code += "-";
              for (let c = 0; c < 5; c++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
              }
            }

            const keyEl = document.createElement("div");
            keyEl.className = "key-item";
            keyEl.style.animationDelay = `${globalIndex * 0.15}s`;

            keyEl.innerHTML = `
                      <div class="product-image-wrapper" style="width: 120px; height: 67px; flex-shrink: 0;">
                          <img src="${item.image || "https://via.placeholder.com/120x67"}" class="game-thumb" alt="${item.title}">
                      </div>
                      <div class="key-details">
                          <span class="game-name">${item.title} ${quantity > 1 ? `(${q + 1}/${quantity})` : ""}</span>
                          <div class="key-box">
                              <span id="key-${globalIndex}">${code}</span>
                              <button class="copy-btn" onclick="copyToClipboard('key-${globalIndex}')" title="Copy">
                                  <i data-lucide="copy" size="16"></i>
                              </button>
                          </div>
                      </div>
                  `;

            keyListContainer.appendChild(keyEl);
            globalIndex++;
          }
        });

        lucide.createIcons();

        // Clear purchased items after showing (optional, maybe keep for refresh? let's keep it in LS but maybe clear cart)
        // We should clear the main CART in index.js, here we just read 'purchasedItems'.
      });

      function copyToClipboard(elementId) {
        const text = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(text).then(() => {
          alert("Đã sao chép mã!");
        });
      }</script></body></html>
