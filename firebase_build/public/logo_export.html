<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NeonNexus Logo Export</title><script src="https://unpkg.com/lucide@latest"></script><style>@import url(https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap);@font-face{font-family:"ROG Lyons";src:url("font/ROGLyonsTypeRegular3.ttf") format("truetype");font-weight:400;font-style:normal;font-display:swap}body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background-color:transparent}.export-container{padding:50px;background-color:#050505;border-radius:20px;display:inline-block}:root{--text-primary:#ffffff}.logo{display:flex;align-items:center;gap:.75rem;user-select:none;text-decoration:none}.logo-icon-wrapper{position:relative;display:flex;align-items:center;justify-content:center}.logo-glow{position:absolute;inset:0;background-color:#71d7e9;filter:blur(12px);opacity:.8;width:100%;height:100%;border-radius:50%}.logo-icon{width:4rem;height:4rem;color:var(--text-primary);position:relative;z-index:10;filter:drop-shadow(0 0 2px rgba(255, 255, 255, .3))}.logo-text-wrapper{display:flex;flex-direction:column}.logo-text{font-size:3rem;font-weight:700;letter-spacing:.3em;color:var(--text-primary);text-transform:uppercase;font-family:"ROG Lyons",monospace;line-height:1}.logo-accent{background:linear-gradient(to right,#22d3ee,#3b82f6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-left:-.1em;filter:drop-shadow(0 0 5px rgba(0, 221, 255, .5))}.logo-subtitle{font-size:1.2rem;color:#6b7280;letter-spacing:.2em;text-transform:uppercase;margin-top:.5rem;font-weight:400;font-family:"ROG Lyons",monospace}</style></head><body><div class="export-container"><div class="logo"><div class="logo-icon-wrapper"><div class="logo-glow"></div><i data-lucide="zap" class="logo-icon"></i></div><div class="logo-text-wrapper"><span class="logo-text">NEON<span class="logo-accent">NEXUS</span></span> <span class="logo-subtitle">INFINITE STORE :: STEAM DEALS</span></div></div></div><script>lucide.createIcons();</script></body></html>
